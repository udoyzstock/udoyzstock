<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
}

header{
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.8));

text-align:center;
}

.logo{
font-size:50px;

}

.tagline{

.btn{

section{

.title{

}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

}

.card{
background:#1b1b1b;
padding:20px;
border-radius:15px;
text-align:center;

}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#FFD700;
font-size:20px;
margin-top:10px;
}

.contact{
text-align:center;

}

footer{
background:black;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>
</head>
